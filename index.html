<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ghost City</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <h1>Ghost City</h1>
    <p class="tagline">Lost Mosques of Belgrade</p>
  </header>

  <main class="main">
    <section class="controls">
      <label for="decade-slider" class="slider-label">Decade</label>
      <input type="range" id="decade-slider" min="1540" max="2026" value="1700" step="10">
      <output id="decade-value" aria-live="polite">1700</output>
    </section>

    <section class="map-section">
      <div id="map"></div>
    </section>

    <section class="cards-section">
      <h2>Mosques</h2>
      <div id="cards" class="cards-grid"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
